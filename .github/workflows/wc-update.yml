name: WC2026 台账自动维护

on:
  schedule:
    - cron: "*/30 * * * *"      # 每30分钟(UTC);GitHub排队时可能略有延迟
  workflow_dispatch: {}          # 支持手动触发

permissions:
  contents: write                # 允许用内置 GITHUB_TOKEN 推送

concurrency:
  group: wc-update
  cancel-in-progress: false      # 不并发，避免推送打架

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install --quiet anthropic

      - name: 核对结果 + 预测新赛事
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/wc_update.py

      - name: 提交并推送变更
        run: |
          git config user.name "wc-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "无变更，跳过提交"
          else
            git commit -m "自动核对/预测 $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M') 北京"
            git push
          fi
