<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026世界杯 · 预测台账</title>
<style>
 :root{--bg:#0f1216;--card:#171c22;--line:#262d36;--fg:#e8edf2;--mut:#8a97a6;--ok:#2fbf71;--no:#e5484d;--accent:#3b82f6}
 *{box-sizing:border-box}
 body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--fg);-webkit-text-size-adjust:100%}
 .wrap{max-width:920px;margin:0 auto;padding:16px}
 h1{font-size:20px;margin:6px 0 2px}
 .sub{color:var(--mut);font-size:12px;margin-bottom:14px;line-height:1.6}
 .cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
 .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;flex:1;min-width:150px}
 .card .k{color:var(--mut);font-size:12px}
 .card .v{font-size:24px;font-weight:700;margin-top:4px}
 .card .v small{font-size:12px;color:var(--mut);font-weight:400}
 .mini{color:var(--mut);font-size:11px;margin:2px 0 16px}
 h2{font-size:15px;margin:18px 0 8px}
 .tw{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
 table{border-collapse:collapse;width:100%;font-size:13px;min-width:600px}
 th,td{padding:9px 8px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap}
 th{background:#1b222a;color:var(--mut);font-weight:600}
 td.match{text-align:left;font-weight:600}
 tr:last-child td{border-bottom:none}
 .ok{color:var(--ok);font-weight:700}
 .no{color:var(--no);font-weight:700}
 .pend{color:var(--mut)}
 .foot{color:var(--mut);font-size:12px;margin-top:14px;line-height:1.7}
 a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
 <h1>⚽ 2026世界杯 · 预测台账</h1>
 <div class="sub">胜负=晋级方 · 主/次比分为两档预测，<b>主或次任一命中即算比分命中（允许1次容错）</b> · 比分只比90分钟常规时间。每天北京时间约20:00自动核对+更新。</div>
 <div class="cards" id="summary"></div>
 <div class="mini" id="mini"></div>
 <h2>实盘预测</h2>
 <div class="tw"><table id="tbl">
  <thead><tr><th>对阵</th><th>胜负预测</th><th>主比分</th><th>次比分</th><th>真实(90')</th><th>胜负中?</th><th>主分中?</th><th>次分中?</th></tr></thead>
  <tbody></tbody>
 </table></div>
 <div class="foot" id="foot"></div>
</div>
<script>
const yn=(b)=> b===true?'<span class="ok">✓</span>': b===false?'<span class="no">✗</span>':'<span class="pend">—</span>';
const pct=(a,b)=> b? Math.round(a/b*100)+'%':'—';
function card(k,v,p){return `<div class="card"><div class="k">${k}</div><div class="v">${p} <small>${v}</small></div></div>`}
fetch('./data.json?_='+Date.now()).then(r=>r.json()).then(rows=>{
  const s=rows.filter(r=>r.settled), n=s.length;
  const win=s.filter(r=>r.hitWinner).length;
  const scoreHit=s.filter(r=> r.hitPrimary===true || r.hitSecondary===true).length;
  const priStrict=s.filter(r=>r.hitPrimary===true).length;
  document.getElementById('summary').innerHTML=
    card('胜负 / 晋级', win+' / '+n, pct(win,n))+
    card('比分命中 · 容错', scoreHit+' / '+n, pct(scoreHit,n));
  document.getElementById('mini').innerHTML= n? `其中「主比分严格命中」${priStrict} / ${n}（${pct(priStrict,n)}）· 已结算 ${n} 场`:'尚无已结算场次';
  document.querySelector('#tbl tbody').innerHTML=rows.map(r=>`<tr>
    <td class="match">${r.match}</td>
    <td>${r.winner||'—'}</td>
    <td>${r.primary||'—'}</td>
    <td>${r.secondary||'—'}</td>
    <td>${r.actual||'<span class="pend">待核</span>'}</td>
    <td>${yn(r.hitWinner)}</td>
    <td>${yn(r.hitPrimary)}</td>
    <td>${yn(r.hitSecondary)}</td>
  </tr>`).join('');
  document.getElementById('foot').innerHTML='盲测校准（回测，不计入上方实盘）：晋级 6/7 · 精确比分 3/7 —— 详见 <a href="https://github.com/zhr2501007-del/wc2026-predictions/blob/main/BACKTEST.md">BACKTEST.md</a>。所有真实结果均来自 web 检索核对，未核实标「待核」。';
});
</script>
</body>
</html>
