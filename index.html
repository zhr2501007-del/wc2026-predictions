<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026世界杯 · 预测台账</title>
<style>
 :root{--bg:#0f1216;--card:#171c22;--card2:#1b222a;--line:#262d36;--fg:#e8edf2;--mut:#8a97a6;--ok:#2fbf71;--no:#e5484d;--accent:#3b82f6;--pill:#232b34}
 *{box-sizing:border-box}
 body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--fg);-webkit-text-size-adjust:100%}
 .wrap{max-width:900px;margin:0 auto;padding:16px}
 h1{font-size:20px;margin:6px 0 2px}
 .sub{color:var(--mut);font-size:12px;margin-bottom:14px;line-height:1.6}
 .sum{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
 .scard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px}
 .scard .k{color:var(--mut);font-size:12px}
 .scard .v{font-size:26px;font-weight:800;margin-top:3px}
 .scard .v small{font-size:12px;color:var(--mut);font-weight:400}
 .mini{color:var(--mut);font-size:11px;margin:4px 2px 14px}
 .search{width:100%;padding:11px 13px;font-size:15px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--fg);margin-bottom:10px}
 .search::placeholder{color:var(--mut)}
 .chips{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px;padding-bottom:2px;scrollbar-width:none}
 .chips::-webkit-scrollbar{display:none}
 .chip{flex:0 0 auto;white-space:nowrap;font-size:12px;color:var(--mut);background:var(--pill);border:1px solid var(--line);border-radius:999px;padding:5px 11px;cursor:pointer;user-select:none}
 .chip.on{color:#fff;background:var(--accent);border-color:var(--accent)}
 .daseg{position:sticky;top:0;z-index:2;background:var(--bg);color:var(--fg);font-size:14px;font-weight:800;letter-spacing:.3px;padding:10px 4px;margin:16px 0 10px;border-bottom:2px solid var(--accent)}
 .daseg .cnt{color:var(--mut);font-size:12px;font-weight:500;margin-left:6px}
 .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
 .m{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 15px}
 .m .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
 .m .name{font-size:15px;font-weight:700;line-height:1.35}
 .m .time{color:var(--mut);font-size:12px;margin-top:3px}
 .pill{font-size:11px;color:var(--mut);background:var(--pill);border:1px solid var(--line);border-radius:999px;padding:3px 9px;white-space:nowrap}
 .pill.done{color:var(--ok);border-color:rgba(47,191,113,.35)}
 .pill.live{color:#f5a524;border-color:rgba(245,165,36,.35)}
 .row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px dashed var(--line)}
 .row .lab{color:var(--mut);font-size:13px}
 .row .val{font-weight:600;font-size:14px}
 .row .val .mk{margin-left:8px;font-weight:800}
 .real{display:flex;justify-content:space-between;align-items:center;background:var(--card2);border-radius:10px;padding:9px 11px;margin-top:10px}
 .real .lab{color:var(--mut);font-size:12px}
 .real .v{font-weight:800;font-size:15px}
 .final{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:13px}
 .final .lab{color:var(--mut)}
 .ok{color:var(--ok)}.no{color:var(--no)}.pend{color:var(--mut)}
 .empty{color:var(--mut);text-align:center;padding:30px 10px;font-size:14px}
 .foot{color:var(--mut);font-size:12px;margin-top:16px;line-height:1.7}
 a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
 <h1>⚽ 2026世界杯 · 预测台账</h1>
 <div class="sub">胜负=晋级方 · 主/次两档比分，<b>任一命中即算比分命中（容错）</b> · 只比90分钟 · 每小时自动核对。</div>
 <div class="sum" id="summary"></div>
 <div class="mini" id="mini"></div>
 <input class="search" id="q" placeholder="🔍 搜索：球队/时间/轮次（如 英 · 塞内加尔 · Belgium · 07-02 · 已结束）">
 <div class="chips" id="chips"></div>
 <div id="list"></div>
 <div class="foot" id="foot"></div>
</div>
<script>
const ALIAS={"英格兰":"england 三狮","刚果":"congo dr-congo 刚果金","比利时":"belgium 红魔欧洲","塞内加尔":"senegal 特兰加雄狮","美国":"usa us united-states","波黑":"bosnia 波斯尼亚","西班牙":"spain 斗牛士 拉罗哈","奥地利":"austria","法国":"france 高卢雄鸡","巴西":"brazil 桑巴","阿根廷":"argentina 潘帕斯","德国":"germany 日耳曼战车","葡萄牙":"portugal","荷兰":"netherlands 橙衣军团","摩洛哥":"morocco","墨西哥":"mexico","加拿大":"canada","挪威":"norway haaland","日本":"japan 蓝武士","韩国":"korea","克罗地亚":"croatia","意大利":"italy","乌拉圭":"uruguay","哥伦比亚":"colombia","塞尔维亚":"serbia","瑞士":"switzerland","丹麦":"denmark","厄瓜多尔":"ecuador","科特迪瓦":"ivory-coast","瑞典":"sweden","巴拉圭":"paraguay","南非":"south-africa","澳大利亚":"australia","伊朗":"iran","加纳":"ghana","埃及":"egypt"};
const mk=(b)=> b===true?'<span class="ok">✓</span>': b===false?'<span class="no">✗</span>':'<span class="pend">—</span>';
const pct=(a,b)=> b? Math.round(a/b*100)+'%':'—';
const scard=(k,v,p)=>`<div class="scard"><div class="k">${k}</div><div class="v">${p} <small>${v}</small></div></div>`;
function row(lab,val,b){return `<div class="row"><span class="lab">${lab}</span><span class="val">${val||'—'}<span class="mk">${mk(b)}</span></span></div>`}
function mdLabel(d){const p=(d||'').split('-');return p.length===3?`${+p[1]}月${+p[2]}日`:d}
function weekday(d){const p=(d||'').split('-');if(p.length!==3)return'';return ['周日','周一','周二','周三','周四','周五','周六'][new Date(Date.UTC(+p[0],+p[1]-1,+p[2])).getUTCDay()];}
function dayHeader(d){const w=weekday(d);return `📅 ${mdLabel(d)}${w?' · '+w:''}`;}
const FILTERS=[["all","全部"],["pending","待核"],["done","已结束"],["winHit","胜负✓"],["winMiss","胜负✗"],["scoreHit","比分✓"]];
let DATA=[],flt="all",q="";
function stat(r){return r.settled?"已结束":"待核"}
function searchText(r){
  let al="";Object.keys(ALIAS).forEach(k=>{if((r.match||"").includes(k))al+=" "+ALIAS[k]});
  const tags=r.settled?((r.hitWinner?"胜负命中 晋级正确":"胜负未中")+" "+((r.hitPrimary||r.hitSecondary)?"比分命中":"比分未中")):"待核 未结算";
  return [r.match,r.winner,r.primary,r.secondary,r.round,r.date,mdLabel(r.date),r.kickoff,r.actual,stat(r),tags,al].join(" ").toLowerCase();
}
function pass(r){
  if(flt==="pending"&&r.settled)return false;
  if(flt==="done"&&!r.settled)return false;
  if(flt==="winHit"&&!(r.settled&&r.hitWinner))return false;
  if(flt==="winMiss"&&!(r.settled&&r.hitWinner===false))return false;
  if(flt==="scoreHit"&&!(r.settled&&(r.hitPrimary||r.hitSecondary)))return false;
  if(q){const needle=q.toLowerCase().split(/\s+/).filter(Boolean);const hay=searchText(r);if(!needle.every(t=>hay.includes(t)))return false;}
  return true;
}
function render(){
  const rows=DATA.filter(pass).slice().sort((a,b)=>(a.kickoff||a.date).localeCompare(b.kickoff||b.date));
  const list=document.getElementById("list");
  if(!rows.length){list.innerHTML='<div class="empty">没有匹配的比赛</div>';return;}
  const cnt={};rows.forEach(r=>cnt[r.date]=(cnt[r.date]||0)+1);
  let html="",curDate=null,open=false;
  rows.forEach(r=>{
    if(r.date!==curDate){ if(open)html+="</div>"; curDate=r.date; html+=`<div class="daseg">${dayHeader(r.date)}<span class="cnt">共${cnt[r.date]}场</span></div><div class="grid">`; open=true;}
    const settled=r.settled, sHit= settled?(r.hitPrimary===true||r.hitSecondary===true):null;
    const pill= settled?'<span class="pill done">已结束</span>':'<span class="pill">待核</span>';
    const t=(r.kickoff||"").slice(5).replace("-","/");
    html+=`<div class="m">
      <div class="top"><div><div class="name">${r.match}</div><div class="time">🕒 北京 ${t||r.date}</div></div>${pill}</div>
      ${row('胜负预测', r.winner, settled? r.hitWinner:null)}
      ${row('主比分', r.primary, settled? r.hitPrimary:null)}
      ${row('次比分', r.secondary, settled? r.hitSecondary:null)}
      <div class="real"><span class="lab">真实比分(90')</span><span class="v">${r.actual|| '<span class="pend">待核</span>'}</span></div>
      <div class="final"><span class="lab">比分命中(容错)</span><span>${mk(sHit)}</span></div>
    </div>`;
  });
  if(open)html+="</div>";
  list.innerHTML=html;
}
function drawChips(){document.getElementById("chips").innerHTML=FILTERS.map(f=>`<span class="chip ${f[0]===flt?'on':''}" data-f="${f[0]}">${f[1]}</span>`).join("");
  document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{flt=c.dataset.f;drawChips();render();});}
fetch('./data.json?_='+Date.now()).then(r=>r.json()).then(rows=>{
  DATA=rows;
  const s=rows.filter(r=>r.settled), n=s.length;
  const win=s.filter(r=>r.hitWinner).length;
  const sh=s.filter(r=>r.hitPrimary===true||r.hitSecondary===true).length;
  const pri=s.filter(r=>r.hitPrimary===true).length;
  document.getElementById('summary').innerHTML=scard('胜负 / 晋级', win+' / '+n, pct(win,n))+scard('比分命中 · 容错', sh+' / '+n, pct(sh,n));
  document.getElementById('mini').innerHTML= n? `其中「主比分严格命中」${pri} / ${n}（${pct(pri,n)}）· 已结算 ${n} 场`:'尚无已结算场次，等赛后自动核对';
  document.getElementById('foot').innerHTML='盲测校准（回测，不计入实盘）：晋级 6/7 · 精确比分 3/7 —— 见 <a href="https://github.com/zhr2501007-del/wc2026-predictions/blob/main/BACKTEST.md">BACKTEST.md</a>。真实结果均来自 web 检索核对，未核实标「待核」。';
  drawChips();render();
});
document.getElementById('q').addEventListener('input',e=>{q=e.target.value.trim();render();});
</script>
</body>
</html>
